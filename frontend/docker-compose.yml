# ============================================================
#  VRI Portal — Frontend (React + Vite)
#  Uso independiente:  docker compose up --build
#  Desde la raíz:     se extiende en ../docker-compose.yml
# ============================================================

services:

  # ── Frontend Vite + React ────────────────────────────────
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # URL del backend Strapi (ajustar si se usa en conjunto)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:1337}
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '5173:5173'
    networks:
      - frontend_network

networks:
  frontend_network:
    driver: bridge

volumes:
  frontend_node_modules:
